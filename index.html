<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sps.css">
</head>

<body>

    <div>
        <div class="container">
            <h2 class="heading">Choose your option</h2>

            <div class="image">
                <button class="stone"> <img src="./img/rock.png" alt=""></button>
                <button class="paper"> <img src="./img/paper.png" alt=""></button>
                <button class="scissor"> <img src="./img/scissors.png" alt=""></button>
            </div><br>


            <div class="show">
                <h2 class="result">Player:</h2>
                <h2 class="result1">Computer:</h2>
            </div>

            <h1 class="revel">🤜✋✌️</h1>


            <div class="score">
                <div class="yo">
                    <h2>Your score</h2>
                    <h2 class="user">0</h2>
                </div>

                <div class="co">
                    <h2>Computer score</h2>
                    <h2 class="comp">0</h2>
                </div>
            </div>

        </div>
    </div>

    <script src="sps.js"></script>
</body>

</html>
